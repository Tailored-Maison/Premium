<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnshakableFaith.za</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #0d0c0b;
    --warm-dark: #141210;
    --sand: #c9b89a;
    --cream: #f2ede6;
    --warm-white: #faf8f4;
    --gold: #b8975a;
    --text: #1a1714;
    --muted: #6b6055;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--warm-white);
    color: var(--text);
    font-weight: 300;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 4rem;
    background: rgba(13,12,11,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(184,151,90,0.15);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    color: var(--sand);
    text-transform: uppercase;
    font-weight: 300;
  }

  nav ul {
    list-style: none;
    display: flex; gap: 2.5rem;
  }

  nav ul a {
    text-decoration: none;
    color: rgba(242,237,230,0.7);
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  nav ul a:hover { color: var(--sand); }

  /* HERO */
  .hero {
    min-height: 100vh;
    background: var(--black);
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

  .hero-image-side {
    position: relative;
    overflow: hidden;
  }

  .hero-image-side img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    opacity: 0.7;
    transition: transform 8s ease;
  }

  .hero:hover .hero-image-side img { transform: scale(1.04); }

  .hero-image-side::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right, var(--black) 0%, transparent 50%),
                linear-gradient(to top, var(--black) 0%, transparent 40%);
  }

  .hero-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 5rem 5rem 5rem;
    position: relative;
    z-index: 2;
  }

  .hero-eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2rem;
    display: flex; align-items: center; gap: 1rem;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 40px; height: 1px;
    background: var(--gold);
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 5vw, 5.5rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 1.5rem;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--sand);
  }

  .hero-sub {
    font-size: 0.9rem;
    line-height: 1.9;
    color: rgba(242,237,230,0.55);
    max-width: 380px;
    margin-bottom: 3rem;
    letter-spacing: 0.02em;
  }

  .btn-primary {
    display: inline-block;
    padding: 1rem 2.5rem;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.3s;
    align-self: flex-start;
  }

  .btn-primary:hover {
    background: var(--gold);
    color: var(--black);
  }

  /* SCRIPTURE STRIP */
  .scripture-strip {
    background: var(--gold);
    padding: 1.8rem 4rem;
    text-align: center;
    overflow: hidden;
  }

  .scripture-strip p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--black);
    letter-spacing: 0.05em;
  }

  .scripture-strip span {
    font-style: normal;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    opacity: 0.7;
    margin-left: 1rem;
    font-family: 'Jost', sans-serif;
    text-transform: uppercase;
  }

  /* ABOUT */
  .about {
    background: var(--black);
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 85vh;
  }

  .about-text {
    padding: 7rem 5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2rem;
  }

  .about-text h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 3.5vw, 3.2rem);
    font-weight: 300;
    line-height: 1.25;
    color: var(--cream);
    margin-bottom: 2rem;
  }

  .about-text p {
    font-size: 0.88rem;
    line-height: 2;
    color: rgba(242,237,230,0.5);
    max-width: 420px;
    margin-bottom: 1.2rem;
  }

  .about-image {
    position: relative;
    overflow: hidden;
  }

  .about-image img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: 0.65;
    transition: transform 6s ease;
  }

  .about-image:hover img { transform: scale(1.03); }

  .about-image::before {
    content: '';
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to left, transparent 50%, var(--black) 100%);
  }

  /* GALLERY / COMMUNITY SECTION */
  .community {
    background: var(--warm-white);
    padding: 7rem 4rem;
  }

  .community-header {
    text-align: center;
    margin-bottom: 5rem;
  }

  .community-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 3.5vw, 3.5rem);
    font-weight: 300;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .community-header p {
    font-size: 0.88rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.9;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 1.5rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    background: var(--black);
  }

  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease, opacity 0.6s ease;
    opacity: 0.85;
  }

  .gallery-item:hover img {
    transform: scale(1.04);
    opacity: 0.6;
  }

  .gallery-item-tall { grid-row: span 2; min-height: 600px; }
  .gallery-item:not(.gallery-item-tall) { min-height: 285px; }

  .gallery-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(13,12,11,0.8) 0%, transparent 60%);
    display: flex; align-items: flex-end;
    padding: 2rem;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .gallery-item:hover .gallery-overlay { opacity: 1; }

  .gallery-overlay p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--cream);
  }

  /* REFLECTIONS */
  .reflections {
    background: var(--warm-dark);
    padding: 7rem 4rem;
  }

  .reflections-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .reflections-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 4rem;
  }

  .reflections-header h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 3vw, 3rem);
    font-weight: 300;
    color: var(--cream);
  }

  .reflections-header a {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid rgba(184,151,90,0.4);
    padding-bottom: 2px;
    transition: border-color 0.3s;
  }

  .reflections-header a:hover { border-color: var(--gold); }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(184,151,90,0.12);
    padding: 2.5rem;
    transition: border-color 0.3s, transform 0.3s;
    cursor: pointer;
  }

  .card:hover {
    border-color: rgba(184,151,90,0.35);
    transform: translateY(-4px);
  }

  .card-tag {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.2rem;
  }

  .card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.35;
    margin-bottom: 1rem;
  }

  .card p {
    font-size: 0.82rem;
    line-height: 1.85;
    color: rgba(242,237,230,0.45);
  }

  /* NEWSLETTER */
  .newsletter {
    background: var(--black);
    padding: 8rem 4rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .newsletter::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(184,151,90,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .newsletter h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 3.5vw, 3.5rem);
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 1rem;
  }

  .newsletter p {
    font-size: 0.88rem;
    color: rgba(242,237,230,0.5);
    max-width: 440px;
    margin: 0 auto 3rem;
    line-height: 1.9;
  }

  .newsletter-form {
    display: flex;
    justify-content: center;
    gap: 0;
    max-width: 480px;
    margin: 0 auto;
  }

  .newsletter-form input {
    flex: 1;
    padding: 1rem 1.5rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(184,151,90,0.3);
    border-right: none;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    outline: none;
  }

  .newsletter-form input::placeholder { color: rgba(242,237,230,0.3); }

  .newsletter-form input:focus { border-color: var(--gold); }

  .newsletter-form button {
    padding: 1rem 2rem;
    background: var(--gold);
    border: 1px solid var(--gold);
    color: var(--black);
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s;
    white-space: nowrap;
  }

  .newsletter-form button:hover { background: #c8a96a; }

  /* FOOTER */
  footer {
    background: var(--black);
    border-top: 1px solid rgba(184,151,90,0.1);
    padding: 3rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--sand);
    text-transform: uppercase;
  }

  footer p {
    font-size: 0.72rem;
    color: rgba(242,237,230,0.3);
    letter-spacing: 0.1em;
  }

  .social-links {
    display: flex; gap: 1.5rem;
  }

  .social-links a {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(242,237,230,0.4);
    text-decoration: none;
    transition: color 0.3s;
  }

  .social-links a:hover { color: var(--gold); }

  /* FADE IN ANIMATION */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    nav { padding: 1.2rem 1.5rem; }
    nav ul { gap: 1.5rem; }
    .hero, .about { grid-template-columns: 1fr; }
    .hero-image-side { min-height: 50vh; order: -1; }
    .hero-image-side::after { background: linear-gradient(to top, var(--black) 0%, transparent 50%); }
    .hero-content { padding: 3rem 1.5rem 4rem; }
    .about-image { min-height: 50vh; }
    .about-text { padding: 4rem 1.5rem; }
    .about-image::before { background: linear-gradient(to top, var(--black) 0%, transparent 50%); }
    .gallery-grid { grid-template-columns: 1fr; }
    .gallery-item-tall { grid-row: span 1; min-height: 320px; }
    .cards { grid-template-columns: 1fr; }
    .reflections-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .newsletter { padding: 5rem 1.5rem; }
    .community { padding: 5rem 1.5rem; }
    .reflections { padding: 5rem 1.5rem; }
    footer { flex-direction: column; gap: 1.5rem; text-align: center; padding: 2.5rem 1.5rem; }
    .newsletter-form { flex-direction: column; }
    .newsletter-form input { border-right: 1px solid rgba(184,151,90,0.3); border-bottom: none; }
  }
</style>
</head>

<!-- NAV -->
<nav>
  <div class="nav-logo">UnshakableFaith<span style="color:var(--gold)">.za</span></div>
  <ul>
    <li><a href="#about">About</a></li>
    <li><a href="#reflections">Reflections</a></li>
    <li><a href="#community">Community</a></li>
    <li><a href="#connect">Connect</a></li>
  </ul>
</nav>
